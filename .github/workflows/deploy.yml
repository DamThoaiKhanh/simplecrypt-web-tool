name: Build Web App

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIX IS RIGHT HERE: changed 'actions/actions-setup-node' to 'actions/setup-node'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: simplecrypt-production-site
          path: dist/
