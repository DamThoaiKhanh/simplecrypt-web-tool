name: Build Web App

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # THAY ĐỔI Ở ĐÂY: Thêm --no-package-lock để tránh việc npm bị crash do file lock cũ
      - name: Install dependencies
        run: npm install --include=dev --no-package-lock

      - name: Build production site
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: simplecrypt-production-site
          path: dist/
