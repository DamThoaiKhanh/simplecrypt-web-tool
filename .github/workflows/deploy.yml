name: Build Web App

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Cập nhật lên Node 22 để không bị cảnh báo deprecation giống trong ảnh của bạn nhé

      # THAY ĐỔI Ở ĐÂY: Thêm `--include=dev` để đảm bảo Vite và TypeScript được cài đặt đầy đủ trên môi trường CI
      - name: Install dependencies
        run: npm install --include=dev

      - name: Build production site
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: simplecrypt-production-site
          path: dist/
